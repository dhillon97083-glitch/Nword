<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Syber Meet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #0a0a1a;
      color: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #lobby {
      text-align: center;
      padding: 40px 30px;
      background: #13132a;
      border-radius: 20px;
      border: 1px solid #2a2a4a;
      max-width: 420px;
      width: 90%;
    }
    .logo { font-size: 48px; margin-bottom: 14px; }
    h1 {
      font-size: 28px;
      margin-bottom: 6px;
      background: linear-gradient(90deg, #4f8ef7, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p { color: #888; font-size: 14px; margin-bottom: 28px; }
    input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid #2a2a4a;
      background: #0a0a1a;
      color: #fff;
      font-size: 15px;
      margin-bottom: 14px;
      outline: none;
    }
    input:focus { border-color: #4f8ef7; }
    input::placeholder { color: #444; }
    button {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(90deg, #4f8ef7, #a855f7);
      color: #fff;
      margin-bottom: 10px;
    }
    button:hover { opacity: 0.88; }
    #shareBox {
      margin-top: 16px;
      background: #0a0a1a;
      border-radius: 10px;
      padding: 12px 14px;
      border: 1px solid #2a2a4a;
      font-size: 13px;
      color: #aaa;
      word-break: break-all;
      display: none;
    }
    #shareLink { color: #4f8ef7; }
    #copyBtn {
      margin-top: 10px;
      background: #1e1e3a;
      font-size: 13px;
      padding: 8px;
      font-weight: 500;
    }
  </style>
</head>
<body>

<div id="lobby">
  <div class="logo">📹</div>
  <h1>Syber Meet</h1>
  <p>Free instant video meetings — no account needed</p>

  <input type="text" id="nameInput" placeholder="Your name" />
  <input type="text" id="roomInput" placeholder="Room name (leave blank for random)" />
  <button onclick="startMeeting()">Start Meeting</button>

  <div id="shareBox">
    🔗 Share this link with others:<br/><br/>
    <span id="shareLink"></span>
    <button id="copyBtn" onclick="copyLink()">Copy Link</button>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const roomFromURL = params.get('room');
  const nameFromURL = params.get('name');

  if (roomFromURL) {
    joinJitsi(roomFromURL, nameFromURL || 'Guest');
  }

  function startMeeting() {
    const name = document.getElementById('nameInput').value.trim() || 'Host';
    const room = document.getElementById('roomInput').value.trim() || 'syber-' + Math.random().toString(36).substr(2, 6);
    const link = `${location.origin}${location.pathname}?room=${room}&name=Guest`;
    document.getElementById('shareLink').textContent = link;
    document.getElementById('shareBox').style.display = 'block';
    joinJitsi(room, name);
  }

  function joinJitsi(room, name) {
    document.getElementById('lobby').style.display = 'none';
    const api = new JitsiMeetExternalAPI('meet.jit.si', {
      roomName: room,
      width: '100%',
      height: '100vh',
      parentNode: document.body,
      userInfo: { displayName: name },
      configOverwrite: { startWithAudioMuted: false, startWithVideoMuted: false },
      interfaceConfigOverwrite: { SHOW_JITSI_WATERMARK: false }
    });
  }

  function copyLink() {
    const link = document.getElementById('shareLink').textContent;
    navigator.clipboard.writeText(link);
    document.getElementById('copyBtn').textContent = '✅ Copied!';
    setTimeout(() => document.getElementById('copyBtn').textContent = 'Copy Link', 2000);
  }
</script>
<script src="https://meet.jit.si/external_api.js"></script>
</body>
</html>
