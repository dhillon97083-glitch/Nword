<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Important Proposal 💼</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #74ebd5, #9face6);
            text-align: center;
            color: #333;
            padding-top: 100px;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 80%;
            max-width: 400px;
            margin: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        h1 {
            color: #ff4b5c;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        .yes {
            background-color: #4CAF50;
            color: white;
        }
        .no {
            background-color: #f44336;
            color: white;
            position: absolute;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>💼 Important Proposal 💼</h1>
    <p>Dear Friend,</p>
    <p>Will you finally get a job and stop being broke? 😭</p>

    <button class="yes" onclick="accept()">YES 😎</button>
    <button class="no" onmouseover="moveButton()">NO 😭</button>
</div>

<script>
    function accept() {
        alert("Great! Welcome to the working class 😂💼");
    }

    function moveButton() {
        const btn = document.querySelector('.no');
        btn.style.top = Math.random() * window.innerHeight + "px";
        btn.style.left = Math.random() * window.innerWidth + "px";
    }
</script>

</body>
</html>
